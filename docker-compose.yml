# tidal-syncer — Docker Compose deployment (sync daemon).
#
# Builds the multi-stage Dockerfile at the repo root (distroless static, nonroot
# UID 65532, bundled static ffmpeg) and wires the three runtime mounts the
# Dockerfile contract expects:
#
#   /app/Music       — output FLAC library     (rw, host dir → container dir)
#   /app/config.yaml — config FILE             (ro, host file → container file)
#   /app/data        — SQLite cache + flock    (rw, host dir → container dir)
#
# The daemon runs as ${PUID:-65532}:${PGID:-65532}. The Makefile auto-sets PUID/PGID
# to your host UID:GID (id -u / id -g) for every `make` compose target, so ./data and
# ./Music are owned by you; a bare `docker compose up` falls back to 65532.
# Host bind dirs MUST be owned by that UID:GID, e.g.:
#   sudo chown -R "$(id -u):$(id -g)" ./Music ./data
# The output FLAC library is written world-readable (dirs 0755, files 0644) so the
# host user and media servers can read ./Music regardless of this UID; the token DB
# under ./data stays private (0600 — readable by the owning UID only).
# Override per-deployment by editing the bind-mount source paths below or by
# layering a docker-compose.override.yml.
#
# When the stored TIDAL refresh token is revoked, the daemon logs an actionable
# message and keeps polling; re-authenticate interactively to recover:
#   make login        # inherits your UID/GID; raw `docker compose run` would use 65532
#
# No top-level `version:` key — Compose v2 deprecated it; `docker compose config`
# warns when present.

services:
  tidal-syncer:
    build: .
    image: tidal-syncer:local
    # amd64-only image (Dockerfile pins GOARCH=amd64 + an amd64 static ffmpeg);
    # pin the platform so an arm64 host emulates rather than producing an image
    # whose bundled ffmpeg would die with "exec format error".
    platform: linux/amd64
    # Default command: long-running poll daemon (configurable in config.yaml).
    # Override for a one-off run (default is the poll daemon), e.g.:
    #   PUID=$(id -u) PGID=$(id -g) docker compose run --rm tidal-syncer sync
    command: ["daemon"]
    user: "${PUID:-65532}:${PGID:-65532}"
    restart: always
    # Prometheus metrics endpoint (served when metrics.enabled in config.yaml),
    # published on loopback so a host Prometheus — or the flake's
    # nixosModules.monitoring — can scrape 127.0.0.1:9101 without exposing it.
    ports:
      - "127.0.0.1:9101:9101"
    # Headroom over the in-process <5s graceful-shutdown budget; the container is
    # SIGKILLed only if the binary does not exit cleanly within 30s of SIGTERM.
    stop_grace_period: 30s
    environment:
      # Already set as ENV in the Dockerfile; restated here so operators can see
      # (and override) the bundled-ffmpeg path without reading the image.
      TIDAL_FFMPEG: /usr/local/bin/ffmpeg
      # Container-local timezone so daemon.time_window in config.yaml is read in
      # Moscow time (the distroless static image ships tzdata/zoneinfo).
      TZ: Europe/Moscow
    volumes:
      - ./Music:/app/Music
      # IMPORTANT: create config.yaml from config.example.yaml BEFORE first run,
      # or Docker auto-creates an empty directory here and the binary fails to
      # start. config.yaml MUST be a FILE bind — a named volume would shadow it
      # with an empty dir, and the loader rejects a directory.
      - ./config.yaml:/app/config.yaml:ro
      # The token DB and cross-process lock live here.
      - ./data:/app/data
